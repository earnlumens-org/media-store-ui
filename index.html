<!DOCTYPE html>
<html lang="en">

<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B8MJFNS6GF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-B8MJFNS6GF');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Baseline security headers. Strict CSP and HSTS are enforced at
       the Cloudflare Pages edge (see DEPLOY.md); these meta tags are
       the in-document fallback for environments that don't honour
       the edge config (local dev, file:// previews). -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <!-- PWA: theme color for the standalone status bar and the iOS
       "Add to Home Screen" icon (apple-touch-icon). The web app manifest
       itself is injected by vite-plugin-pwa at build time. -->
  <meta name="theme-color" content="#10131A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png" />
  <!--
    Title and favicon are intentionally left blank/transparent so we
    don't flash the platform defaults on every refresh before the
    tenant probe resolves. The runtime watcher in App.vue sets both
    once tenantStore.isReady becomes true (falling back to the
    EARNLUMENS defaults for the platform origin / tenants without
    overrides). The empty <title> still ships so crawlers see a tag.
  -->
  <title></title>
  <link rel="icon" href="data:," />
  <meta property="og:title" content="EARNLUMENS" />
  <meta property="og:description" content="A collaborative financial education platform on the Stellar network" />
  <meta property="og:url" content="https://earnlumens.org/" />
  <meta property="og:image" content="https://earnlumens.org/meta/earnlumens-meta-image-v1.png?v=2" />
  <meta property="og:image:width" content="1344" />
  <meta property="og:image:height" content="768" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="EARNLUMENS" />
  <meta name="twitter:description" content="A collaborative financial education platform on the Stellar network" />
  <meta name="twitter:image" content="https://earnlumens.org/meta/earnlumens-meta-image-v1.png?v=2" />
  <!-- Boot loader styles: a centred spinner shown from first paint until Vue
       mounts (and replaces #app's content). Prevents the black screen during
       cold starts / PWA resume while the JS bundle, i18n and tenant probe
       initialise. Uses the PWA theme background so there's no colour flash. -->
  <style>
    #app-boot {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #10131A;
    }
    #app-boot .app-boot-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.18);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: app-boot-spin 0.8s linear infinite;
    }
    @keyframes app-boot-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="app-boot">
      <div class="app-boot-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
